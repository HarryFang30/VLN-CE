ENVIRONMENT:
  MAX_EPISODE_STEPS: 500
SIMULATOR:
  ACTION_SPACE_CONFIG: v0
  AGENT_0:
    SENSORS: [RGB_SENSOR, DEPTH_SENSOR]
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 15
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: -1
    ALLOW_SLIDING: True
  RGB_SENSOR:
    WIDTH: 256
    HEIGHT: 256
    HFOV: 90
    POSITION: [0, 1.25, 0]
    TYPE: HabitatSimRGBSensor
  DEPTH_SENSOR:
    WIDTH: 256
    HEIGHT: 256
    HFOV: 90
    MIN_DEPTH: 0.0
    MAX_DEPTH: 10.0
    POSITION: [0, 1.25, 0]
    TYPE: HabitatSimDepthSensor
TASK:
  TYPE: VLN-v0
  SUCCESS_DISTANCE: 3.0
  SENSORS: []
  INSTRUCTION_SENSOR_UUID: instruction
  POSSIBLE_ACTIONS: [STOP, MOVE_FORWARD, TURN_LEFT, TURN_RIGHT]
  # Only use basic measurements that don't require torch
  MEASUREMENTS: [
    DISTANCE_TO_GOAL,
    SUCCESS,
    SPL
  ]
  SUCCESS:
    SUCCESS_DISTANCE: 3.0
  SPL:
    SUCCESS_DISTANCE: 3.0
DATASET:
  TYPE: VLN-CE-v1
  SPLIT: train
  DATA_PATH: /workspace/R2R_VLNCE_v1-3_preprocessed/{split}/{split}.json.gz
  # Matterport3D 目录：/dataset/mp3d/<scene_id>/<scene_id>.glb
  # 数据集中 scene_id 格式为 mp3d/xxx/xxx.glb，故 SCENES_DIR 需为 /dataset/
  SCENES_DIR: /data/
